[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-artifact-inspector"
version = "0.1.0-alpha"
description = "Understand any AI-generated file: reveal model, prompt, seed, LoRA, workflow"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"

[project.urls]
Homepage = "https://github.com/biuta666/ai-artifact-inspector"

[project.scripts]
artifact = "inspector.cli:main"

[tool.setuptools.packages.find]
include = ["inspector*"]
